name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install Python and project deps
        run: uv sync --locked --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest

  frontend:
    name: Frontend (eslint + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Only run when an OpenAI key is configured (skips on forks / first push without secret).
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    env:
      MODEL: openai:gpt-5.4-mini-2026-03-17
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Fail fast if OPENAI_API_KEY is missing
        if: env.OPENAI_API_KEY == ''
        run: |
          echo "::warning::OPENAI_API_KEY is not set as a repo secret — skipping E2E."
          echo "To enable, add it under Settings → Secrets and variables → Actions."
          exit 0

      - name: Materialise .env for docker compose
        run: |
          cat > .env <<EOF
          MODEL=${MODEL}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          EOF

      - name: Boot the full stack
        run: docker compose up -d --build

      - name: Wait for the API to be healthy
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:8000/health > /dev/null; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          echo "API never became healthy"
          docker compose logs api
          exit 1

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Tear down docker
        if: always()
        run: docker compose down
