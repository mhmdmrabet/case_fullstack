services:
  api:
    build:
      context: ./backend
      target: runtime
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  web:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
